# Alembic configuration for Learn framework

[alembic]
# Path to migration scripts
script_location = %(here)s

# Prepend sys.path with project root (migrations is inside llm_kelt package)
prepend_sys_path = ../..

# Path separator for prepend_sys_path (silences deprecation warning)
path_separator = os

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Truncate long revision identifiers
truncate_slug_length = 40

# Set to 'true' to run in offline mode
# offline_mode = false

# Timezone for revision dates
# timezone =

# Database URL - overridden by env.py from config
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Hooks run after generating new migrations

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = DEBUG
handlers = console
qualname =

[logger_sqlalchemy]
level = INFO
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = DEBUG
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
