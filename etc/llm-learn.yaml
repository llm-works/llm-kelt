# Learn Framework Configuration
# Main entry point - includes all sub-configs

# Infrastructure (logging, database, llm, embedding)
logging: !include './infra.yaml#logging'
pgserver: !include './infra.yaml#pgserver'
dbs: !include './infra.yaml#dbs'

llm: !include './llm.yaml'

# Embedding service configuration
embedding:
  model_name: all-MiniLM-L6-v2   # Current model (used as key in fact_embeddings)
  dimensions: 384                 # Expected embedding dimensions
  base_url: http://localhost:8001/v1  # Embedding server URL

# Proxy server settings
proxy:
  host: "0.0.0.0"
  port: 8010
  context_key: "default"
  model_name: "llm-learn-proxy"

# Adapter settings (for training integration with llm-infer)
adapters:
  lora:
    base_path: !include "../.env.yaml#paths.adapters"

# Learn-specific settings (runtime behavior)
learn:
  # Memory/Context Injection settings
  memory:
    max_facts: 100              # Maximum facts to inject per query
    min_confidence: 0.0         # Minimum confidence threshold for facts
    fact_position: append       # Where to place facts: append or prepend

  # Default system prompt (can be overridden per query)
  default_system_prompt: ""

# Training configuration (for DPO workflow)
training:
  base_model: Qwen/Qwen2.5-3B-Instruct  # Default base model for training
  output_dir: ./training-output          # Default output directory

  profiles:
    default:
      beta: 0.1
      quantize: true
      epochs: 3
      batch_size: 4
      learning_rate: 2e-4

    aggressive:
      beta: 0.05
      quantize: true
      epochs: 5
      batch_size: 4
      learning_rate: 5e-4

    quick:
      beta: 0.1
      quantize: true
      epochs: 1
      batch_size: 2
      learning_rate: 2e-4

models: !include "./models.yaml"
