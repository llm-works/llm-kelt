# Model locations for training and inference
# Used by llm-infer's ModelResolver to find local models

locations:
  - !include "../.env.yaml#paths.models.huggingface"

# Model selection defaults
selection:
  generate:
    default: qwen2.5-0.5b-instruct  # Small model for training tests
  embed:
    default: bge-small-en-v1.5

defaults:
  system_prompt: null

# Model-specific configurations
# Matched by model name (from selected.yaml or --model)

models:
  # ---------------------------------------------------------------------------
  # Qwen2.5 instruct models
  # ---------------------------------------------------------------------------
  qwen2.5-coder-3b-instruct-bnb-4bit: {}
